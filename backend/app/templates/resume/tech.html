{% from 'resume/partials/section.html' import render_section %}
<!doctype html>
<html lang="{{ resume._language }}">
<head>
  <meta charset="utf-8">
  <style>
    {% include 'resume/style-base.css' %}
    .tech-template .resume-header { border-left: 5px solid var(--theme-color); padding-left: 14px; }
    .tech-template .section-title { color: var(--theme-color); border-bottom: 1px solid #dbeafe; }
  </style>
</head>
<body>
  <main class="resume-page tech-template">
    {% if 'basics' not in (resume.layout.hidden_sections or []) %}
      {% include 'resume/partials/basics.html' %}
    {% endif %}
    {% for section in resume._sections %}
      {{ render_section(section, resume) }}
    {% endfor %}
  </main>
</body>
</html>
